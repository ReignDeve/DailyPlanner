appId: com.lifeplanner.app
productName: LifePlanner
copyright: Copyright © Marius Bungert

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/icon.png
    to: build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
